---
extends: 'default'

rules:
  line-length:
    max: 150
    allow-non-breakable-words: true
    allow-non-breakable-inline-mappings: true
  braces:
    min-spaces-inside: 1
    max-spaces-inside: 1
  truthy:
    allowed-values: ['true', 'false', 'on']
    check-keys: true
  comments:
    min-spaces-from-content: 1
  new-lines:
    type: 'unix'
  quoted-strings:
    quote-type: 'any'
    required: true
